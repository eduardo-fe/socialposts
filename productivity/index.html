<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OECD Labour Productivity Explorer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.12);
    --border-mid: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --text-muted: #6b6b67;
    --accent: #C60B1E;
    --accent-light: #fdeaec;
    --blue: #185FA5;
    --blue-light: #e6f1fb;
    --green: #3B6D11;
    --radius: 10px;
    --font: 'Georgia', 'Times New Roman', serif;
    --font-sans: 'Helvetica Neue', Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --border: rgba(255,255,255,0.1);
      --border-mid: rgba(255,255,255,0.2);
      --text: #f0efea;
      --text-muted: #9a9990;
      --accent: #f0545f;
      --accent-light: #3a1015;
      --blue: #85B7EB;
      --blue-light: #042C53;
      --green: #97C459;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }
  header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
  }
  header h1 {
    font-family: var(--font);
    font-size: 20px;
    font-weight: normal;
    color: var(--text);
    flex: 1;
    min-width: 260px;
  }
  header h1 span { color: var(--accent); }
  .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--font-sans);
  }
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 64px);
  }
  .sidebar {
    background: var(--surface);
    border-right: 0.5px solid var(--border);
    padding: 1.25rem;
    overflow-y: auto;
  }
  .sidebar-section {
    margin-bottom: 1.5rem;
  }
  .sidebar-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
  }
  .toggle-group {
    display: flex;
    border: 0.5px solid var(--border-mid);
    border-radius: 8px;
    overflow: hidden;
  }
  .toggle-group button {
    flex: 1;
    padding: 7px 4px;
    font-size: 12px;
    font-family: var(--font-sans);
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-right: 0.5px solid var(--border);
  }
  .toggle-group button:last-child { border-right: none; }
  .toggle-group button.active {
    background: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .search-wrap {
    position: relative;
    margin-bottom: 8px;
  }
  .search-wrap input {
    width: 100%;
    padding: 6px 10px 6px 28px;
    font-size: 13px;
    font-family: var(--font-sans);
    background: var(--bg);
    border: 0.5px solid var(--border-mid);
    border-radius: 8px;
    color: var(--text);
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--blue); }
  .search-icon {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 13px;
    pointer-events: none;
  }
  .country-list {
    max-height: 380px;
    overflow-y: auto;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
  }
  .country-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 10px;
    cursor: pointer;
    border-bottom: 0.5px solid var(--border);
    transition: background 0.1s;
  }
  .country-item:last-child { border-bottom: none; }
  .country-item:hover { background: var(--surface); }
  .country-item.selected { background: var(--blue-light); }
  .country-item.spain { background: var(--accent-light); }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .country-name {
    font-size: 12.5px;
    color: var(--text);
    flex: 1;
  }
  .country-badge {
    font-size: 10px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .quick-btn {
    font-size: 11px;
    font-family: var(--font-sans);
    padding: 4px 9px;
    border: 0.5px solid var(--border-mid);
    border-radius: 20px;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .quick-btn:hover { background: var(--surface); color: var(--text); }
  .clear-btn {
    font-size: 11px;
    font-family: var(--font-sans);
    padding: 4px 9px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    text-decoration: underline;
  }
  .clear-btn:hover { color: var(--text); }
  .main {
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    overflow: hidden;
  }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-family: var(--font); color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .stat-card.highlight .stat-value { color: var(--accent); }
  .chart-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    flex: 1;
  }
  .chart-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 1rem;
  }
  .chart-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: -0.75rem;
    margin-bottom: 1rem;
  }
  canvas { max-height: 340px; }
  .legend-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 12px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.1s;
  }
  .legend-item:hover { background: var(--bg); }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .no-data {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .source-note {
    font-size: 10px;
    color: var(--text-muted);
    text-align: right;
    padding-top: 4px;
  }
  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 0.5px solid var(--border); max-height: 340px; }
    .main { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>OECD Labour Productivity Explorer &thinsp;<span>&#9632;</span></h1>
  <span class="subtitle">GDP per hour worked &bull; USD PPP &bull; Constant 2020 prices</span>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">View</div>
      <div class="toggle-group">
        <button id="btn-levels" class="active" onclick="setMode('levels')">Levels ($)</button>
        <button id="btn-indexed" onclick="setMode('indexed')">Growth (2000=100)</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Quick selections</div>
      <div class="quick-btns">
        <button class="quick-btn" onclick="selectGroup('peers')">Spain + peers</button>
        <button class="quick-btn" onclick="selectGroup('top5')">Top 5 growers</button>
        <button class="quick-btn" onclick="selectGroup('bottom5')">Stagnant</button>
        <button class="quick-btn" onclick="selectGroup('all')">All</button>
        <button class="clear-btn" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Countries <span id="sel-count" style="color:var(--accent)"></span></div>
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="search" placeholder="Filter..." oninput="filterList()">
      </div>
      <div class="country-list" id="country-list"></div>
    </div>
  </div>

  <div class="main">
    <div class="stats-row" id="stats-row"></div>
    <div class="chart-card">
      <div class="chart-title" id="chart-title">Select countries to compare</div>
      <div class="chart-subtitle" id="chart-subtitle"></div>
      <canvas id="chart"></canvas>
      <div class="legend-row" id="legend-row"></div>
      <div class="source-note">Source: OECD Productivity Database &bull; GDP per hour worked &bull; USD PPP, constant 2020 prices</div>
    </div>
  </div>
</div>

const countries = Object.keys(RAW.levels).sort();

function getColour(c, alpha=1) {
  const hex = COLOURS[c] || "#888";
  if (alpha === 1) return hex;
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function buildList() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('country-list');
  const growth = RAW.growth;
  const sorted = [...countries].sort((a,b) => (growth[b]||0)-(growth[a]||0));
  list.innerHTML = '';
  sorted.filter(c => c.toLowerCase().includes(q)).forEach(c => {
    const item = document.createElement('div');
    const isSel = selected.has(c);
    const isSpain = c === 'Spain';
    item.className = 'country-item' + (isSel ? ' selected' : '') + (isSpain ? ' spain' : '');
    const g = growth[c];
    const sign = g > 0 ? '+' : '';
    item.innerHTML = `
      <div class="dot" style="background:${getColour(c)}"></div>
      <span class="country-name">${c}</span>
      <span class="country-badge">${g !== undefined ? sign + g.toFixed(1) + '%' : '—'}</span>
    `;
    item.onclick = () => toggleCountry(c);
    list.appendChild(item);
  });
  document.getElementById('sel-count').textContent = selected.size ? `(${selected.size})` : '';
}

function filterList() { buildList(); }

function toggleCountry(c) {
  if (c === 'Spain') return;
  selected.has(c) ? selected.delete(c) : selected.add(c);
  buildList();
  renderChart();
}

function clearAll() {
  selected = new Set(['Spain']);
  buildList();
  renderChart();
}

function selectGroup(g) {
  if (g === 'all') {
    selected = new Set(countries);
  } else {
    selected = new Set(['Spain', ...(GROUPS[g] || [])]);

  buildList();
  renderChart();
}

function setMode(m) {

}

    const data = years.map(y => src[c][y] !== undefined ? src[c][y] : null);
    return {
      label: c,
      data,
      borderColor: getColour(c),
      backgroundColor: getColour(c, 0.08),
      borderWidth: isSpain ? 2.5 : 1.4,
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.15,
      spanGaps: false,
      order: isSpain ? 0 : 1
    };
  });

  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridCol = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  const textCol = isDark ? '#9a9990' : '#6b6b67';

  if (chart) chart.destroy();
  const ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: years, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: isDark ? '#242422' : '#fff',
          borderColor: isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)',
          borderWidth: 1,
          titleColor: isDark ? '#f0efea' : '#1a1a18',
          bodyColor: isDark ? '#9a9990' : '#6b6b67',
          padding: 10,
          callbacks: {
            title: items => items[0].label,
            label: item => {
              const v = item.raw;
              if (v === null) return null;
              const label = mode === 'levels' ? `$${v.toFixed(1)}/hr` : `${v.toFixed(1)}`;
              return ` ${item.dataset.label}: ${label}`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: gridCol },
          ticks: { color: textCol, font: { size: 11 }, maxTicksLimit: 8 }
        },
        y: {
          grid: { color: gridCol },
          ticks: {
            color: textCol,
            font: { size: 11 },
            callback: v => mode === 'levels' ? '$' + v : v
          },
          title: {
            display: true,
            text: mode === 'levels' ? 'USD per hour (PPP, 2020 prices)' : 'Index (2000 = 100)',
            color: textCol,
            font: { size: 11 }
          }
        }
      }
    }
  });

  const title = mode === 'levels' ? 'Labour productivity — levels' : 'Labour productivity — growth since 2000';
  document.getElementById('chart-title').textContent = title;
  document.getElementById('chart-subtitle').textContent = mode === 'indexed'
    ? 'All countries re-indexed to 100 in 2000. Spain always shown in red.'
    : 'GDP per hour worked. Spain always shown in red.';

  renderLegend(datasets);
  renderStats();
}

function renderLegend(datasets) {
  const row = document.getElementById('legend-row');
  row.innerHTML = '';
  datasets.forEach(ds => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${ds.borderColor}"></div>${ds.label}`;
    item.onclick = () => { if (ds.label !== 'Spain') toggleCountry(ds.label); };
    row.appendChild(item);
  });
}

function renderStats() {
  const src = mode === 'levels' ? RAW.levels : RAW.indexed;
  const statsRow = document.getElementById('stats-row');
  if (!selected.has('Spain') || !src['Spain']) { statsRow.innerHTML = ''; return; }

  const spainData = src['Spain'];
  const years = Object.keys(spainData).map(Number).sort((a,b)=>a-b);
  const latest = years[years.length - 1];
  const latestVal = spainData[latest];

  let html = `
    <div class="stat-card highlight">
      <div class="stat-label">Spain ${latest}</div>
      <div class="stat-value">${mode === 'levels' ? '$' + latestVal.toFixed(1) : latestVal.toFixed(1)}</div>
      <div class="stat-sub">${mode === 'levels' ? 'USD/hr PPP' : 'index (2000=100)'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Spain growth since 2000</div>
      <div class="stat-value">+${RAW.growth['Spain'].toFixed(1)}%</div>
      <div class="stat-sub">rank ${Object.entries(RAW.growth).sort((a,b)=>b[1]-a[1]).findIndex(([k])=>k==='Spain')+1} of ${Object.keys(RAW.growth).length}</div>
    </div>`;

  const others = [...selected].filter(c => c !== 'Spain' && src[c]);
  if (others.length > 0 && mode === 'levels') {
    const above = others.filter(c => {
      const d = src[c]; const ys = Object.keys(d).map(Number).sort((a,b)=>a-b);
      return d[ys[ys.length-1]] > latestVal;
    }).length;
    html += `
      <div class="stat-card">
        <div class="stat-label">Peers above Spain</div>
        <div class="stat-value">${above} / ${others.length}</div>
        <div class="stat-sub">in latest year</div>
      </div>`;
  }

  statsRow.innerHTML = html;
}

buildList();
renderChart();
</script>
</body>
</html>
